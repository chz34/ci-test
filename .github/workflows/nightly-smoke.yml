name: Nightly Smoke Test

on:
  schedule:
    - cron: '0 2 * * *'  # 每天 UTC 02:00 触发
  workflow_dispatch:       # 支持手动触发

jobs:
  smoke:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run smoke tests
        run: npm test
